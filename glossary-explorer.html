<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bluejay Glossary Explorer</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #ffffff;
        --bg-soft: rgba(248, 250, 252, 0.92);
        --panel: rgba(255, 255, 255, 0.88);
        --panel-solid: #ffffff;
        --border: rgba(148, 163, 184, 0.25);
        --text: #0f172a;
        --muted: #475569;
        --subtle: #64748b;
        --accent: #2563eb;
        --accent-soft: rgba(37, 99, 235, 0.08);
        --shadow: 0 18px 60px -28px rgba(15, 23, 42, 0.28);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #020617;
          --bg-soft: rgba(15, 23, 42, 0.9);
          --panel: rgba(15, 23, 42, 0.82);
          --panel-solid: rgba(255, 255, 255, 0.04);
          --border: rgba(255, 255, 255, 0.08);
          --text: #f8fafc;
          --muted: #cbd5e1;
          --subtle: #94a3b8;
          --accent: #60a5fa;
          --accent-soft: rgba(96, 165, 250, 0.12);
          --shadow: 0 18px 60px -28px rgba(0, 0, 0, 0.55);
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 0;
        background: transparent;
        color: var(--text);
        font:
          15px/1.6 Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      .page {
        display: flex;
        flex-direction: column;
        gap: 2rem;
      }

      .toolbar {
        position: sticky;
        top: 0;
        z-index: 20;
        border: 1px solid var(--border);
        border-radius: 28px;
        padding: 1.1rem;
        background: var(--panel);
        backdrop-filter: blur(16px);
        box-shadow: var(--shadow);
      }

      .toolbar-row {
        display: flex;
        gap: 1rem;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 0.9rem;
      }

      .search-wrap {
        position: relative;
        flex: 1;
      }

      .search-icon {
        position: absolute;
        left: 1rem;
        top: 50%;
        transform: translateY(-50%);
        color: var(--subtle);
        pointer-events: none;
      }

      .search {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 0.95rem 1rem 0.95rem 2.9rem;
        background: var(--bg-soft);
        color: var(--text);
        outline: none;
        transition:
          border-color 0.18s ease,
          box-shadow 0.18s ease,
          transform 0.18s ease;
      }

      .search::placeholder {
        color: var(--subtle);
      }

      .search:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 4px var(--accent-soft);
      }

      .toolbar-actions {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      .pill,
      .letter-link,
      .clear-btn {
        border: 1px solid var(--border);
        background: var(--bg-soft);
        color: var(--muted);
        border-radius: 999px;
        font: inherit;
      }

      .pill {
        padding: 0.7rem 0.95rem;
      }

      .clear-btn {
        padding: 0.7rem 1rem;
        cursor: pointer;
        transition:
          border-color 0.18s ease,
          color 0.18s ease,
          background 0.18s ease;
      }

      .clear-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
        background: var(--accent-soft);
      }

      .letters {
        display: flex;
        flex-wrap: wrap;
        gap: 0.55rem;
      }

      .letter-link {
        text-decoration: none;
        padding: 0.5rem 0.85rem;
        transition:
          border-color 0.18s ease,
          color 0.18s ease,
          background 0.18s ease;
      }

      .letter-link:hover {
        border-color: var(--accent);
        color: var(--accent);
        background: var(--accent-soft);
      }

      .letter-link.disabled {
        opacity: 0.35;
        pointer-events: none;
      }

      .empty {
        display: none;
        border: 1px dashed var(--border);
        border-radius: 28px;
        background: var(--bg-soft);
        padding: 3rem 1.5rem;
        text-align: center;
      }

      .empty.show {
        display: block;
      }

      .sections {
        display: flex;
        flex-direction: column;
        gap: 2.5rem;
      }

      .section.hidden {
        display: none;
      }

      .section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        margin-bottom: 1rem;
      }

      .section-title {
        margin: 0;
        font-size: 1.7rem;
        letter-spacing: -0.02em;
      }

      .cards {
        display: grid;
        gap: 1rem;
        grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      }

      .card {
        border: 1px solid var(--border);
        border-radius: 24px;
        background: var(--panel-solid);
        padding: 1.2rem;
        box-shadow: 0 14px 34px -24px rgba(15, 23, 42, 0.28);
        transition:
          transform 0.18s ease,
          border-color 0.18s ease,
          box-shadow 0.18s ease,
          background 0.18s ease;
      }

      .card:hover {
        transform: translateY(-2px);
        border-color: rgba(37, 99, 235, 0.35);
        box-shadow: 0 20px 44px -28px rgba(37, 99, 235, 0.25);
      }

      .card.hidden {
        display: none;
      }

      .term {
        margin: 0 0 0.5rem;
        font-size: 1.02rem;
        letter-spacing: -0.01em;
      }

      .definition {
        margin: 0;
        color: var(--muted);
      }

      @media (max-width: 768px) {
        .toolbar-row {
          flex-direction: column;
          align-items: stretch;
        }

        .toolbar-actions {
          justify-content: space-between;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="toolbar">
        <div class="toolbar-row">
          <label class="search-wrap" for="search">
            <span class="search-icon">⌕</span>
            <input id="search" class="search" type="search" placeholder="Search terms, acronyms, or concepts" />
          </label>
          <div class="toolbar-actions">
            <div class="pill"><span id="count">16</span> terms</div>
            <button id="clear" class="clear-btn" type="button">clear</button>
          </div>
        </div>
        <nav id="letters" class="letters" aria-label="Glossary letters"></nav>
      </section>

      <section id="empty" class="empty">
        <h2>No terms found</h2>
        <p>Try a different keyword, acronym, or phrase.</p>
      </section>

      <div id="sections" class="sections"></div>
    </main>

    <script>
      const glossaryTerms = [
        ['A', 'Agent', 'The voice or chat system you are testing or monitoring in Bluejay.', 'agent voice agent system testing monitoring bluejay'],
        ['A', 'Alert', 'A notification triggered when a monitored metric or behavior crosses a threshold that needs attention.', 'alert notification threshold monitoring quality issue'],
        ['C', 'Community', 'A reusable group of Digital Humans organized around a shared testing purpose.', 'community digital humans group reusable testing'],
        ['C', 'Custom Metric', 'A user-defined score or evaluation signal used to measure what matters for a specific use case.', 'custom metric scoring evaluation signal measurement'],
        ['C', 'Customer Traits', 'The behavioral and contextual attributes that shape how a simulated customer behaves.', 'customer traits behavior context simulated customer persona'],
        ['D', 'Dashboard', 'A consolidated view of trends, quality signals, and operational health across runs or live traffic.', 'dashboard trends monitoring quality metrics live traffic'],
        ['D', 'Digital Human', 'A synthetic customer used to simulate realistic conversations during evaluation.', 'digital human synthetic customer simulation evaluation'],
        ['M', 'Metrics Lab', 'The space where teams experiment with, refine, and operationalize measurement ideas.', 'metrics lab experiment measurement scoring prototype'],
        ['O', 'Observability', "Bluejay's live-monitoring layer for evaluating real customer conversations in production.", 'observability monitoring production evaluation calls live traffic'],
        ['S', 'Simulation', 'A controlled pre-production evaluation run designed to test agent behavior against realistic scenarios.', 'simulation test scenario evaluation pre-production'],
        ['S', 'Simulation Run', 'A specific execution of a simulation that produces transcripts, results, and diagnostics.', 'simulation run execution transcripts diagnostics results'],
        ['S', 'SIP', 'A telephony protocol used to connect voice systems and route audio-based interactions into evaluation workflows.', 'sip telephony protocol voice routing audio'],
        ['T', 'Test', 'The Bluejay product area focused on pre-production validation through simulations and scenario coverage.', 'test pre-production validation simulation coverage'],
        ['T', 'Trace', 'A detailed execution record that helps explain how a conversation or evaluation unfolded.', 'trace execution record debugging observability'],
        ['W', 'Webhook', 'A callback that sends Bluejay events or results into another system.', 'webhook callback events integration delivery'],
        ['W', 'Workflow', 'A structured path that models conversation logic, branching behavior, or downstream automation.', 'workflow branching automation orchestration'],
      ].map(([letter, term, definition, search]) => ({ letter, term, definition, search }));

      const letters = [...new Set(glossaryTerms.map((entry) => entry.letter))];
      const sectionsEl = document.getElementById('sections');
      const lettersEl = document.getElementById('letters');
      const countEl = document.getElementById('count');
      const emptyEl = document.getElementById('empty');
      const searchEl = document.getElementById('search');
      const clearEl = document.getElementById('clear');

      function renderLetters(activeLetters) {
        lettersEl.innerHTML = '';
        letters.forEach((letter) => {
          const link = document.createElement('a');
          link.className = 'letter-link' + (activeLetters.has(letter) ? '' : ' disabled');
          link.href = '#' + letter.toLowerCase();
          link.textContent = letter;
          lettersEl.appendChild(link);
        });
      }

      function renderSections(terms) {
        sectionsEl.innerHTML = '';

        const grouped = letters
          .map((letter) => ({
            letter,
            terms: terms.filter((term) => term.letter === letter),
          }))
          .filter((group) => group.terms.length);

        grouped.forEach((group) => {
          const section = document.createElement('section');
          section.className = 'section';
          section.id = group.letter.toLowerCase();

          const header = document.createElement('div');
          header.className = 'section-header';

          const title = document.createElement('h2');
          title.className = 'section-title';
          title.textContent = group.letter;

          const pill = document.createElement('div');
          pill.className = 'pill';
          pill.textContent = group.terms.length + ' terms';

          header.appendChild(title);
          header.appendChild(pill);

          const cards = document.createElement('div');
          cards.className = 'cards';

          group.terms.forEach((entry) => {
            const card = document.createElement('article');
            card.className = 'card';

            const term = document.createElement('h3');
            term.className = 'term';
            term.textContent = entry.term;

            const definition = document.createElement('p');
            definition.className = 'definition';
            definition.textContent = entry.definition;

            card.appendChild(term);
            card.appendChild(definition);
            cards.appendChild(card);
          });

          section.appendChild(header);
          section.appendChild(cards);
          sectionsEl.appendChild(section);
        });

        const activeLetters = new Set(grouped.map((group) => group.letter));
        renderLetters(activeLetters);
        countEl.textContent = String(terms.length);
        emptyEl.classList.toggle('show', terms.length === 0);
      }

      function filterTerms(query) {
        const normalized = query.trim().toLowerCase();
        if (!normalized) return glossaryTerms;

        return glossaryTerms.filter((entry) =>
          `${entry.term} ${entry.definition} ${entry.search}`.toLowerCase().includes(normalized)
        );
      }

      searchEl.addEventListener('input', (event) => {
        renderSections(filterTerms(event.target.value));
      });

      clearEl.addEventListener('click', () => {
        searchEl.value = '';
        renderSections(glossaryTerms);
        searchEl.focus();
      });

      renderSections(glossaryTerms);
    </script>
  </body>
</html>
